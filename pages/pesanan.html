<!DOCTYPE html>
<html lang="su">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan Saya | PandaRebahan</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    .pesanan-section { padding: 150px 8% 100px; min-height: 100vh; }
    .title { text-align: center; margin-bottom: 40px; font-size: 32px; font-weight: 700; }
    .order-list { display: flex; flex-direction: column; gap: 30px; max-width: 800px; margin: auto; }
    .order-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; transition: 0.3s; }
    .order-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--primary); }
    .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border); padding-bottom: 15px; margin-bottom: 20px; }
    
    /* STYLE UNTUK TIMELINE TRACKING ALAA SHOPEE */
    .stepper-container { position: relative; margin: 30px 0 40px; padding: 0 20px; }
    .stepper { display: flex; justify-content: space-between; position: relative; z-index: 2; }
    .stepper-bg-line { position: absolute; top: 15px; left: 40px; right: 40px; height: 4px; background: var(--border); z-index: 1; }
    .progress-bar { position: absolute; top: 15px; left: 40px; height: 4px; background: #2ecc71; z-index: 1; transition: width 0.5s ease; }
    
    .step { text-align: center; position: relative; width: 60px; }
    .step-icon { width: 34px; height: 34px; border-radius: 50%; background: var(--card); border: 4px solid var(--border); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: var(--text); transition: 0.4s; position: relative; z-index: 3; }
    .step.active .step-icon { background: #2ecc71; border-color: #2ecc71; color: white; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
    .step p { font-size: 12px; font-weight: 600; opacity: 0.5; margin-top: 5px; }
    .step.active p { opacity: 1; color: #2ecc71; }

    .order-item { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; padding: 10px; background: var(--bg); border-radius: 12px; }
    .order-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
    
    .order-footer { margin-top: 20px; text-align: right; border-top: 1px dashed var(--border); padding-top: 20px; }
    .resi-box { float: left; text-align: left; background: var(--bg); padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); }
    .resi-text { font-size: 14px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
    .btn-copy { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 10px; font-weight: 600; transition: 0.2s; }
    .btn-copy:hover { background: var(--primary); color: white; }
    
    /* GABUNGAN TOMBOL AKSI */
    .action-group { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
    
    .btn-terima { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; flex: 1; max-width: 200px; }
    .btn-terima:hover { background: #27ae60; transform: translateY(-2px); }

    /* TOMBOL LAPOR CS BARU */
    .btn-lapor { background: transparent; color: #e74c3c; border: 2px solid #e74c3c; padding: 12px 25px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; flex: 1; max-width: 200px; }
    .btn-lapor:hover { background: #e74c3c; color: white; transform: translateY(-2px); }

    @media(max-width: 600px) {
      .stepper-bg-line, .progress-bar { left: 20px; right: 20px; }
      .step p { font-size: 10px; }
      .resi-box { float: none; margin-bottom: 15px; width: 100%; text-align: center; }
      .action-group { flex-direction: column; }
      .btn-terima, .btn-lapor { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <header data-aos="fade-down">
    <div class="logo">PANDA<span>REBAHAN</span></div>
    <nav>
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="cart.html">Keranjang</a>
    </nav>
    <button id="themeToggle">Mode</button>
  </header>

  <section class="pesanan-section">
    <div class="title" data-aos="fade-up">Tracking Pesanan</div>
    <div class="order-list" id="orderContainer">
      <p style="text-align: center;">Keur nyandak data pesanan...</p>
    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  
  <script>
    AOS.init({ once: true });
    document.getElementById("themeToggle").onclick = () => document.body.classList.toggle("light");

    function showToast(message, isError = false) {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerText = message;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add("hide"); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // Fungsi copy resi
    window.copyResi = function(resi) {
      navigator.clipboard.writeText(resi).then(() => {
        showToast("Nomor resi berhasil disalin! 📋");
      });
    }

    // NAH INI DIA FUNGSI WHATSAPP-NYA A!
    window.laporKendala = function(invoiceId) {
        const nomorWA = "62895620496445"; // Ganti nomor WA Aa di sini
        const pesan = `Halo CS PandaRebahan, pesanan saya dengan nomor Invoice *${invoiceId}* sepertinya mengalami kendala (belum sampai / barang kurang). Mohon dibantu cek statusnya ya!`;
        const linkWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${encodeURIComponent(pesan)}`;
        window.open(linkWA, '_blank');
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({ apiKey: "AIzaSyAeYwblUK5lo3l14fjo7LJ9dyyEmxT4TaI", authDomain: "pandarebahan132703.firebaseapp.com", projectId: "pandarebahan132703", storageBucket: "pandarebahan132703.firebasestorage.app", messagingSenderId: "119871759918", appId: "1:119871759918:web:011d6094b297705b7ea1bf" });
    const auth = getAuth(app); const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (user) loadOrders(user.uid);
      else { showToast("Login heula mang!", true); setTimeout(() => window.location.href = "login.html", 1500); }
    });

    window.loadOrders = async function(userId) {
      const container = document.getElementById("orderContainer");
      if(!userId && auth.currentUser) userId = auth.currentUser.uid; 

      try {
        const q = query(collection(db, "orders"), where("userId", "==", userId));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) { container.innerHTML = "<p style='text-align: center;'>Can aya pesanan euy. Hayu jajan heula!</p>"; return; }

        let orders = []; querySnapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
        orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        container.innerHTML = "";
        let delay = 100;
        
        orders.forEach(order => {
          const orderItems = order.items || [];
          const totalHarga = order.totalPrice || 0;
          const statusOrder = order.status || "Menunggu Pembayaran";
          const resiOrder = order.resi || 'Belum ada resi';
          const tgl = new Date(order.createdAt || Date.now()).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
          const invId = order.invoiceId || order.id.slice(0, 8).toUpperCase();
          
          let stepIndex = 0; let progressWidth = 0;
          if (statusOrder === "Menunggu Pembayaran") { stepIndex = 1; progressWidth = 0; }
          else if (statusOrder === "Dibayar" || statusOrder === "Dalam Proses Pengemasan") { stepIndex = 2; progressWidth = 33.33; }
          else if (statusOrder === "Dikirim") { stepIndex = 3; progressWidth = 66.66; }
          else if (statusOrder === "Selesai") { stepIndex = 4; progressWidth = 100; }

          let itemsHTML = "";
          orderItems.forEach(item => { itemsHTML += `<div class="order-item"><img src="${item.image || ''}" alt=""><div><h4 style="font-size:15px; margin-bottom:5px;">${item.name || 'Produk'}</h4><p style="font-size:13px;opacity:0.7;">${item.quantity || 1} x Rp${(item.price || 0).toLocaleString('id-ID')}</p></div></div>`; });

          // PERHATIKAN: Parameter tombol konfirmasi sekarang bawa Invoice ID dan Harga
          let actionButtonsHTML = "";
          if (statusOrder === "Dikirim") {
            actionButtonsHTML = `
              <div class="action-group">
                <button class="btn-lapor" onclick="laporKendala('${invId}')">🚨 Lapor CS</button>
                <button class="btn-terima" onclick="konfirmasiSelesai('${order.id}', '${invId}', ${totalHarga})">✔ Pesanan Diterima</button>
              </div>
            `;
          }

          container.innerHTML += `
            <div class="order-card" data-aos="fade-up" data-aos-delay="${delay}">
              <div class="order-header">
                <div>
                  <h3 style="font-size: 16px;">ID: ${invId}</h3>
                  <p style="font-size:12px;opacity:0.7; margin-top:5px;">${tgl}</p>
                </div>
                <div style="font-weight: 700; color: var(--primary);">${statusOrder}</div>
              </div>
              <div class="stepper-container">
                <div class="stepper-bg-line"></div>
                <div class="progress-bar" style="width: ${progressWidth}%;"></div>
                <div class="stepper">
                  <div class="step ${stepIndex >= 1 ? 'active' : ''}"><div class="step-icon">1</div><p>Bayar</p></div>
                  <div class="step ${stepIndex >= 2 ? 'active' : ''}"><div class="step-icon">2</div><p>Diproses</p></div>
                  <div class="step ${stepIndex >= 3 ? 'active' : ''}"><div class="step-icon">3</div><p>Dikirim</p></div>
                  <div class="step ${stepIndex >= 4 ? 'active' : ''}"><div class="step-icon">✔</div><p>Selesai</p></div>
                </div>
              </div>
              <div style="margin-bottom: 20px;">${itemsHTML}</div>
              <div class="order-footer">
                <div class="resi-box">
                  <span style="font-size: 12px; opacity: 0.7; display: block; margin-bottom: 5px;">Nomor Resi:</span>
                  <span class="resi-text">${resiOrder}</span>
                </div>
                <div style="display: inline-block;">
                  <p style="font-size: 13px; opacity: 0.7; margin-bottom: 5px;">Total Belanja:</p>
                  <strong style="font-size: 22px; color: var(--primary);">Rp${totalHarga.toLocaleString('id-ID')}</strong>
                </div>
                ${actionButtonsHTML}
              </div>
            </div>`;
          delay += 100;
        });
      } catch (error) { console.error("ERROR FIREBASE:", error); }
    }

    // LOGIKA BARU: UBAH STATUS + TEMBAK EMAIL
    window.konfirmasiSelesai = async function(orderId, invId, totalHarga) {
      if(confirm("Baju PandaRebahan na geus nepi kalayan aman?")) {
        try {
          showToast("Sedang memproses & mengirim Invoice...", false);
          
          // 1. Ubah Status di Firebase
          await updateDoc(doc(db, "orders", orderId), { status: "Selesai" });

          // 2. Kirim Request ke Server Node.js untuk ngirim Email
          const userEmail = auth.currentUser.email; // Ambil email pembeli yang lagi login
          await fetch("/kirim-invoice", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ 
                  email: userEmail, 
                  invoiceId: invId, 
                  totalHarga: totalHarga 
              })
          });

          showToast("Mantap! Pesanan rengse & Invoice masuk ke email euy!", false);
          loadOrders(); // Refresh layar
        } catch(e) {
          console.error(e);
          showToast("Gagal update status, cobaan deui.", true);
        }
      }
    }
  </script>
</body>
</html>
